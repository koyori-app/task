# Detects drift between backend OpenAPI export and committed apps/frontend/openapi.json.
name: OpenAPI Drift Check

on:
  push:
    branches: [main]
    paths:
      - 'apps/backend/**'
      - 'apps/frontend/openapi.json'
      - 'rust-toolchain.toml'
      - '.github/workflows/openapi-drift-check.yml'
  pull_request:
    paths:
      - 'apps/backend/**'
      - 'apps/frontend/openapi.json'
      - 'rust-toolchain.toml'
      - '.github/workflows/openapi-drift-check.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  drift:
    runs-on: ubuntu-latest

    env:
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust
        run: |
          if ! command -v rustup &>/dev/null; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain none
            echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          fi
          export PATH="$HOME/.cargo/bin:$PATH"
          rustup show active-toolchain
          rustc --version

      - name: Install mold
        run: sudo apt-get install -y mold jq

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10

      - name: Cache cargo registry
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/backend/target
          key: cargo-openapi-${{ runner.os }}-${{ hashFiles('apps/backend/Cargo.lock') }}
          restore-keys: |
            cargo-openapi-${{ runner.os }}-

      - name: Export OpenAPI from backend
        run: cargo run --bin export_openapi -- /tmp/exported-openapi.json
        working-directory: apps/backend

      - name: Compare with committed openapi.json
        run: |
          set -euo pipefail
          jq -S '.' apps/frontend/openapi.json > /tmp/committed-openapi.json
          jq -S '.' /tmp/exported-openapi.json > /tmp/exported-openapi-normalized.json

          if diff -q /tmp/committed-openapi.json /tmp/exported-openapi-normalized.json >/dev/null; then
            echo "OpenAPI contract is in sync."
            exit 0
          fi

          echo "::error::apps/frontend/openapi.json is out of sync with the backend API."
          echo ""
          echo "After changing the backend API, regenerate and commit openapi.json:"
          echo "  cd apps/frontend && pnpm openapi && node_modules/.bin/vp fmt"
          echo "  git add apps/frontend/openapi.json"
          echo ""
          echo "Diff (normalized):"
          diff -u /tmp/committed-openapi.json /tmp/exported-openapi-normalized.json | head -200 || true
          exit 1

# Report body (frontend-bundle-diagnostics-report.md) is PR-side build output; do not trust its contents.
# レポート本文(frontend-bundle-diagnostics-report.md)は PR 側のビルド出力であり内容は信頼できない。
name: Frontend bundle diagnostics (comment)

on:
  workflow_run:
    workflows: [Frontend bundle diagnostics (inspect)]
    types: [completed]

permissions:
  actions: read
  contents: read
  pull-requests: write

jobs:
  comment:
    if: github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    concurrency:
      group: frontend-bundle-diagnostics-comment-${{ github.event.workflow_run.id }}
      cancel-in-progress: true
    steps:
      - name: Download bundle report
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: frontend-bundle-report
          path: ${{ runner.temp }}/frontend-bundle-report
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Read pull request number
        id: read-pr-number
        shell: bash
        run: |
          pr_number="$(cat "$RUNNER_TEMP/frontend-bundle-report/pr-number.txt")"
          [[ "$pr_number" =~ ^[0-9]+$ ]]
          echo "pr-number=$pr_number" >> "$GITHUB_OUTPUT"

      - name: Comment on pull request
        uses: thollander/actions-comment-pull-request@24bffb9b452ba05a4f3f77933840a6a841d1b32b # v3.0.1
        with:
          pr-number: ${{ steps.read-pr-number.outputs.pr-number }}
          comment-tag: frontend-bundle-diagnostics
          file-path: ${{ runner.temp }}/frontend-bundle-report/frontend-bundle-diagnostics-report.md

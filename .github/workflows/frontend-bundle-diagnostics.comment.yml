name: Frontend bundle diagnostics (comment)

on:
  workflow_run:
    workflows: [Frontend bundle diagnostics (inspect)]
    types: [completed]

permissions:
  actions: read
  contents: read
  pull-requests: write

jobs:
  comment:
    if: github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.pull_requests[0].number
    runs-on: ubuntu-latest
    concurrency:
      group: frontend-bundle-diagnostics-comment-${{ github.event.workflow_run.id }}
      cancel-in-progress: true
    steps:
      - name: Download bundle report
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: frontend-bundle-report
          path: ${{ runner.temp }}/frontend-bundle-report
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Comment on pull request
        uses: thollander/actions-comment-pull-request@24bffb9b452ba05a4f3f77933840a6a841d1b32b # v3.0.1
        with:
          pr-number: ${{ github.event.workflow_run.pull_requests[0].number }}
          comment-tag: frontend-bundle-diagnostics
          file-path: ${{ runner.temp }}/frontend-bundle-report/frontend-bundle-diagnostics-report.md

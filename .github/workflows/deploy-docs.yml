name: Deploy Docs to GitHub Pages

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Enable corepack
        run: corepack enable

      - name: Install pnpm
        run: corepack prepare pnpm@latest --activate

      - name: Install dependencies
        run: pnpm install
        working-directory: docs

      - name: Generate static site
        run: pnpm generate
        working-directory: docs

      - name: Deploy to GitHub Pages (gh-pages)
        uses: peaceiris/actions-gh-pages@v4
        with:
          # Use a PAT stored in `GH_PAGES_DEPLOY_TOKEN` if present (recommended for org/repos with restricted GITHUB_TOKEN),
          # otherwise fall back to the built-in github token.
          github_token: ${{ secrets.GH_PAGES_DEPLOY_TOKEN || github.token }}
          publish_dir: docs/.output/public
          publish_branch: gh-pages

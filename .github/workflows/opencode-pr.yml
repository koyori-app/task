name: opencode-pr

on:
  pull_request:
    types: [opened, reopened, ready_for_review]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  opencode:
    if: |
      (
        github.event_name == 'pull_request'
      ) ||
      (
        (
          github.event_name == 'pull_request_review_comment' ||
          (
            github.event_name == 'issue_comment' &&
            github.event.issue.pull_request
          )
        ) &&
        (
          startsWith(github.event.comment.body, '/oc') ||
          contains(github.event.comment.body, ' /oc') ||
          startsWith(github.event.comment.body, '/opencode') ||
          contains(github.event.comment.body, ' /opencode')
        ) &&
        contains(fromJson('["yupix", "sousuke0422"]'), github.event.comment.user.login)
      )

    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run opencode
        uses: anomalyco/opencode/github@latest
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          use_github_token: true
          model: opencode-go/mimo-v2.5-pro
          prompt: |
            日本語で回答してください。
            特段の指定がない限りレビュー時にコードの修正は行わないでください。

            【重複指摘の禁止】
            レビューを開始する前に、このPRに既に投稿されている自分（opencode）のレビューコメントを必ず確認してください。
            過去のレビューで既に指摘した内容は繰り返さないでください。
            新しいコミットで追加・変更された差分に絞ってレビューし、既に修正済みまたは指摘済みの問題は対象外としてください。
            指摘することが何もない場合は「前回のレビューから新たな問題は見つかりませんでした」と一言だけ返してください。

            【確認してから指摘する】
            指摘する前に必ず実際のコードを読んで問題が存在することを確認してください。
            推測や「〜の可能性があります」という曖昧な指摘はしないでください。
            コードを確認した結果、問題がなければその項目は指摘しないでください。

            【優先度の扱い】
            High・Medium の指摘のみ詳しく説明してください。
            Low の指摘は最後に箇条書きでまとめるだけにしてください。詳細説明は不要です。

            バックエンドは以下のスタックです。
            - Rust
            - Axum
            - SeaORM - PostgreSQL
            - Apalis - Redis
            フロントエンドは以下のスタックです。
            - Vue.js
            - Vike
            - Tailwind CSS
            - Pinia
            - Tanstack Query, Table, Form
            - Shadcn Vue
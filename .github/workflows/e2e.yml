name: E2E Tests

on:
  push:
    branches: [main]
    paths:
      - 'apps/backend/**'
      - 'apps/frontend/**'
      - 'e2e/**'
      - '.github/workflows/e2e.yml'
  pull_request:
    paths:
      - 'apps/backend/**'
      - 'apps/frontend/**'
      - 'e2e/**'
      - '.github/workflows/e2e.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres@sha256:3a82e1f56c8f0f5616a11103ac3d47e632c3938698946a7ad26da0df1334744a
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: task_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: valkey/valkey@sha256:c6d4637d757379a2ff040148b95c85936d85a06c129eafa5fbe582f9e720e12f
        ports:
          - 6379:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: 'true'
      CARGO_INCREMENTAL: '0'

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Install mold
        run: sudo apt-get install -y mold

      - name: Install postgresql-client
        run: sudo apt-get install -y postgresql-client

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: |
            apps/backend -> target
            apps/backend/migration -> target

      - name: Build backend
        run: cargo build --release --bin backend
        working-directory: apps/backend
        env:
          SQLX_OFFLINE: 'true'

      - name: Build migration CLI
        run: cargo build --release --bin migration
        working-directory: apps/backend/migration

      - name: sccache stats (post-build)
        run: sccache --show-stats

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          package_json_file: apps/frontend/package.json

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "store=$(pnpm store path)" >> $GITHUB_OUTPUT
        working-directory: apps/frontend

      - name: Cache pnpm store
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: pnpm-store-e2e-${{ runner.os }}-${{ hashFiles('apps/frontend/pnpm-lock.yaml', 'e2e/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-e2e-${{ runner.os }}-

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: apps/frontend

      - name: Install e2e dependencies
        run: pnpm install --ignore-workspace --frozen-lockfile
        working-directory: e2e

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
        working-directory: e2e

      - name: Run E2E tests
        run: pnpm test
        working-directory: e2e
        env:
          CI: 'true'
          BACKEND_BIN: ${{ github.workspace }}/apps/backend/target/release/backend
          MIGRATION_BIN: ${{ github.workspace }}/apps/backend/migration/target/release/migration
          E2E_DATABASE_URL: postgresql://test:test@localhost:5432/task_e2e
          E2E_REDIS_URL: redis://localhost:6379

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: |
            e2e/playwright-report/
            e2e/test-results/
          retention-days: 7

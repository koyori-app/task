name: Backend Test

on:
  push:
    branches: [main]
    paths:
      - 'apps/backend/**'
      - '.github/workflows/backend-test.yml'
  pull_request:
    paths:
      - 'apps/backend/**'
      - '.github/workflows/backend-test.yml'

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: valkey/valkey:8
        ports:
          - 6379:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/test
      REDIS_URL: redis://localhost:6379
      SMTP_HOST: localhost
      SMTP_PORT: "587"
      SMTP_USERNAME: test
      SMTP_PASSWORD: test
      SMTP_FROM: test@example.com
      EMAIL_VERIFICATION_APP_URL: http://localhost:3000
      PERSONAL_TOKEN_SECRET: "00000000000000000000000000000000"
      RECOVERY_CODE_SECRET: "00000000000000000000000000000000"
      TOTP_ENCRYPTION_KEY: "01234567890123456789012345678901"
      SQLX_OFFLINE: "true"
      CARGO_INCREMENTAL: "0"
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Cache cargo registry
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/backend/target
          key: cargo-${{ runner.os }}-${{ hashFiles('apps/backend/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Run migrations
        run: cargo run -p migration -- up
        working-directory: apps/backend

      - name: Run tests
        run: cargo test
        working-directory: apps/backend

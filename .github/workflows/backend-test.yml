name: Backend Test

on:
  push:
    branches: [main]
    paths:
      - 'apps/backend/**'
      - '.github/workflows/backend-test.yml'
  pull_request:
    paths:
      - 'apps/backend/**'
      - '.github/workflows/backend-test.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres@sha256:2203e6282d9e7de7c24d7da234e2a744fb325df366a3fd8ed940e8abbee39527 # 17.10-trixie
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: valkey/valkey@sha256:c6d4637d757379a2ff040148b95c85936d85a06c129eafa5fbe582f9e720e12f # 8.1.8-trixie
        ports:
          - 6379:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      RUSTC_WRAPPER: sccache
      DATABASE_URL: postgresql://test:test@localhost:5432/test
      REDIS_URL: redis://localhost:6379
      SMTP_HOST: localhost
      SMTP_PORT: "587"
      SMTP_USERNAME: test
      SMTP_PASSWORD: test
      SMTP_FROM: test@example.com
      EMAIL_VERIFICATION_APP_URL: http://localhost:3000
      PERSONAL_TOKEN_SECRET: "00000000000000000000000000000000"
      RECOVERY_CODE_SECRET: "00000000000000000000000000000000"
      TOTP_ENCRYPTION_KEY: "01234567890123456789012345678901"
      ARGON2_TEST_MODE: "true"
      SQLX_OFFLINE: "true"
      CARGO_INCREMENTAL: "0"
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Install mold
        run: sudo apt-get install -y mold

      - name: Install sccache
        uses: taiki-e/install-action@c93ccc03e00cd0e08e494f5fd058a6c55a6a1907 # v2.82.8
        with:
          tool: sccache

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: apps/backend -> target

      - name: Install cargo-nextest
        uses: taiki-e/install-action@c93ccc03e00cd0e08e494f5fd058a6c55a6a1907 # v2.82.8
        with:
          tool: cargo-nextest

      - name: Run tests
        run: cargo nextest run --test-threads=1
        working-directory: apps/backend

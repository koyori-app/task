name: Backend Test

on:
  push:
    branches: [main]
    paths:
      - 'apps/backend/**'
      - '.github/workflows/backend-test.yml'
  pull_request:
    paths:
      - 'apps/backend/**'
      - '.github/workflows/backend-test.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres@sha256:0027bef26712baaee437a4ea48fdf3d2d2e2bc5f0d81615374408ca320f3c7e3
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: valkey/valkey@sha256:c6d4637d757379a2ff040148b95c85936d85a06c129eafa5fbe582f9e720e12f
        ports:
          - 6379:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/test
      REDIS_URL: redis://localhost:6379
      SMTP_HOST: localhost
      SMTP_PORT: "587"
      SMTP_USERNAME: test
      SMTP_PASSWORD: test
      SMTP_FROM: test@example.com
      EMAIL_VERIFICATION_APP_URL: http://localhost:3000
      PERSONAL_TOKEN_SECRET: "00000000000000000000000000000000"
      RECOVERY_CODE_SECRET: "00000000000000000000000000000000"
      TOTP_ENCRYPTION_KEY: "01234567890123456789012345678901"
      ARGON2_TEST_MODE: "true"
      SQLX_OFFLINE: "true"
      CARGO_INCREMENTAL: "0"
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Cache cargo registry
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/backend/target
          key: cargo-debug-${{ runner.os }}-${{ hashFiles('apps/backend/Cargo.lock') }}
          restore-keys: |
            cargo-debug-${{ runner.os }}-

      - name: Run tests
        run: cargo test
        working-directory: apps/backend

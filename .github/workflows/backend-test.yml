name: Backend Test

on:
  push:
    branches: [main]
    paths:
      - 'apps/backend/**'
      - '.github/workflows/backend-test.yml'
  pull_request:
    paths:
      - 'apps/backend/**'
      - '.github/workflows/backend-test.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres@sha256:29ee7bb30d804447dc9a91fd0d74322ae1dc3a4072cc6346f70a5ed6e783b565
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: valkey/valkey@sha256:c6d4637d757379a2ff040148b95c85936d85a06c129eafa5fbe582f9e720e12f
        ports:
          - 6379:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/test
      REDIS_URL: redis://localhost:6379
      SMTP_HOST: localhost
      SMTP_PORT: "587"
      SMTP_USERNAME: test
      SMTP_PASSWORD: test
      SMTP_FROM: test@example.com
      EMAIL_VERIFICATION_APP_URL: http://localhost:3000
      PERSONAL_TOKEN_SECRET: "00000000000000000000000000000000"
      RECOVERY_CODE_SECRET: "00000000000000000000000000000000"
      TOTP_ENCRYPTION_KEY: "01234567890123456789012345678901"
      ARGON2_TEST_MODE: "true"
      SQLX_OFFLINE: "true"
      CARGO_INCREMENTAL: "0"
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: apps/backend -> target

      # - name: Install cargo-nextest
      #   uses: taiki-e/install-action@56545b37b57562edd73171cb6c62cc509db4c34e # v2.81.7
      #   with:
      #     tool: cargo-nextest

      - name: Run tests
        run: cargo test
        working-directory: apps/backend

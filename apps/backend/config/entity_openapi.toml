# OpenAPI / utoipa attributes applied to sea-orm-cli generated entities.
# Consumed by scripts/seaorm_postprocess.sh after `generate entity`.

[entities.labels]
struct_attrs = ['#[schema(as = crate::entities::labels::Model)]']

[[entities.labels.fields]]
name = "id"
attrs = ['#[schema(value_type = String, format = "uuid")]']

[[entities.labels.fields]]
name = "icon_url"
attrs = ['#[sea_orm(nullable)]', '#[schema(nullable)]']

[[entities.labels.fields]]
name = "project_id"
attrs = ['#[sea_orm(nullable)]', '#[schema(value_type = Option<String>, format = "uuid", nullable)]']

[entities.users]
struct_attrs = ['#[schema(as=crate::entities::users::Model)]']

[[entities.users.fields]]
name = "id"
attrs = ['#[schema(value_type = String, format="uuid")]']

[[entities.users.fields]]
name = "username"
attrs = ['#[schema(value_type = String, format="username")]']

[[entities.users.fields]]
name = "bio"
attrs = ['#[sea_orm(nullable)]', '#[schema(nullable)]']

[[entities.users.fields]]
name = "avatar_url"
attrs = ['#[sea_orm(nullable)]', '#[schema(nullable)]']

[[entities.users.fields]]
name = "email"
attrs = ['#[schema(value_type = String, format="email")]']

[[entities.users.fields]]
name = "email_verified"
attrs = []

[[entities.users.doc_comments]]
field = "email_verified"
comment = "メールアドレスの確認が済んでいるかどうか"

[[entities.users.fields]]
name = "password_hash"
attrs = ['#[sea_orm(nullable)]', '#[schema(ignore)]', '#[serde(skip_serializing)]']

[[entities.users.fields]]
name = "sessions_revoked_at"
attrs = ['#[sea_orm(nullable)]', '#[schema(ignore)]', '#[serde(skip_serializing)]']

[[entities.users.fields]]
name = "totp_enabled"
attrs = []

[[entities.users.doc_comments]]
field = "totp_enabled"
lines = [
  "TOTP 2FA が有効か（`totp_credentials.is_verified` とセットで有効扱い）。",
  "更新は `handlers::auth_2fa` 経由の ActiveModel のみとし、他モジュールから直接書き換えないこと。",
]


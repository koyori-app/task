[package]
name = "backend"
version = "0.1.0"
edition = "2024"
default-run = "backend"

[dependencies]
axum = { version = "0.8.8", features = ["macros"] }
sea-orm = { version = "2.0.0-rc.38", features = [
    "sqlx-postgres",
    "runtime-tokio-rustls",
    "macros",
    "debug-print",
    "entity-registry",
    "schema-sync",
] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
tokio = { version = "1.52.1", features = ["macros", "rt-multi-thread"] }
tracing = "0.1"
utoipa = "5.4.0"
utoipa-axum = "0.2.0"
utoipa-scalar = { version = "0.3.0", features = ["axum"] }
tower-http = { version = "0.6", features = ["cors"] }
axum_session = { version = "0.20.0" }
axum_session_redispool = { version = "0.11.0" }
dotenvy = "0.15"
config = "0.15.22"
axum-valid = "0.24.0"
validator = { version = "0.20.0", features = ["derive"] }
sentry = { version = "0.48.2", features = ["tower-axum-matched-path"] }
tower = "0.5.2"
argon2 = "0.5.3"

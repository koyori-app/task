# mold linker — Linux のみ対象（macOS は system linker、Windows は lld を使用）
# 依存パッケージ: Linux → mold (apt install mold / dnf install mold)

# sccache — コンパイルキャッシュ（クレート単位でキャッシュし増分ビルドを高速化）
# 依存パッケージ: cargo install sccache  または  apt install sccache
[build]
rustc-wrapper = "sccache"

[target.x86_64-unknown-linux-gnu]
rustflags = ["-C", "link-arg=-fuse-ld=mold"]

[target.aarch64-unknown-linux-gnu]
rustflags = ["-C", "link-arg=-fuse-ld=mold"]

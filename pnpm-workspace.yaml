packages:
  - apps/cli
  - apps/frontend
  - packages/*
sharedWorkspaceLockfile: false
allowBuilds:
  '@nestjs/core': true
  '@openapitools/openapi-generator-cli': true
  '@sentry/cli': true
  esbuild: true
  vue-demi: true
catalog:
  vite: npm:@voidzero-dev/vite-plus-core@0.2.5
  vite-plus: 0.2.5
minimumReleaseAgeExclude:
  - '@koyori-app/openapi-vue-query'
  - '@vue/compiler-core@3.6.0-rc.2'
  - '@vue/compiler-dom@3.6.0-rc.2'
  - '@vue/compiler-sfc@3.6.0-rc.2'
  - '@vue/compiler-ssr@3.6.0-rc.2'
  - '@vue/compiler-vapor@3.6.0-rc.2'
  - '@vue/reactivity@3.6.0-rc.2'
  - '@vue/runtime-core@3.6.0-rc.2'
  - '@vue/runtime-dom@3.6.0-rc.2'
  - '@vue/runtime-vapor@3.6.0-rc.2'
  - '@vue/server-renderer@3.6.0-rc.2'
  - '@vue/shared@3.6.0-rc.2'
  - vue@3.6.0-rc.2
overrides:
  vite: 'catalog:'
peerDependencyRules:
  allowAny:
    - '@vitest/coverage-v8'
    - vite
    - vitest
  allowedVersions:
    vite: '*'
    vitest: '*'
saveExact: true
catalogMode: prefer
